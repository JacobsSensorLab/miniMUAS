// ---------- command lifecycle: toasts + the Commands mini-log ----------
// Every operator command gets a visible lifecycle — sent → acked/refused
// (with the provider's reason) → outcome — surfaced as transient toasts
// and a compact per-command log, not just event-log lines.
const CMDS = { list: [], byId: {} };   // newest first, capped
function toast(text, cls){
  if (REPLAY.seeking) return;          // seeks fast-dispatch history
  const el = document.createElement("div");
  el.className = "toast" + (cls ? " " + cls : "");
  el.textContent = text;
  toasts.appendChild(el);
  while (toasts.children.length > 5) toasts.firstChild.remove();
  setTimeout(() => { el.classList.add("out");
    setTimeout(() => el.remove(), 350); }, 4000);
}
// Scoped-cancel label for an acked long-running entry (✕ in the mini-log):
// takeoff/rtl map to their busy labels, an accepted override detour to
// `sensor-override`, an armed watchpoint to `watchpoint:<id>` (the id
// rides the ack detail: "watchpoint wp-3 armed: …"). Raster/investigate
// long ops are mission-dispatched (no mini-log entry) — their ✕ lives on
// the vehicle tile's task chip and the detection panel.
function abortableOf(c){
  if (c.state !== "acked" || !c.vehicle) return null;
  if (c.command === "takeoff") return "takeoff";
  if (c.command === "rtl") return "rtl";
  if (/^sensor .*\boverride\b/.test(c.command)) return "sensor-override";
  if (/^sensor /.test(c.command)){
    const wp = (c.detail || "").match(/\bwp-\d+\b/);
    if (wp) return `watchpoint:${wp[0]}`;
  }
  return null;
}
function renderCmdLog(){
  cmdlog.innerHTML = CMDS.list.map(c => {
    const cls = c.state === "refused" || c.state === "failed" ? "err"
      : c.state === "timeout" ? "warn"
      : c.state === "acked" || c.state === "done" ? "ok" : "";
    const when = new Date(c.t * 1000).toLocaleTimeString();
    const ab = abortableOf(c);
    const x = ab ? `<button class="xabort" data-vid="${c.vehicle}"` +
      ` data-label="${ab}" title="Cancel ${ab} on ${c.vehicle}` +
      ` (scoped abort — no RTL)">✕</button>` : "";
    return `<div class="n ${cls}">${x}<span class="t">${when}</span>` +
      `${c.vehicle || ""} ${c.command} <span class="st">${c.state}</span>` +
      `${c.detail ? " — " + c.detail : ""}</div>`;
  }).join("") || "<span style='color:#6f6f6f;font-size:12px'>no commands yet</span>";
}
// One delegated handler survives the innerHTML rebuilds above.
cmdlog.addEventListener("click", e => {
  const b = e.target.closest(".xabort");
  if (b) send({cmd:"task_abort", vehicle:b.dataset.vid, label:b.dataset.label});
});
function cmdUpsert(id, fields){
  let c = CMDS.byId[id];
  if (!c){
    c = { id, vehicle: "", command: "", state: "sent", detail: "", t: 0 };
    CMDS.byId[id] = c;
    CMDS.list.unshift(c);
    if (CMDS.list.length > 40){
      const gone = CMDS.list.pop();
      delete CMDS.byId[gone.id];
    }
  }
  Object.assign(c, fields);
  renderCmdLog();
  return c;
}
// Lifecycle taps for command/sensor/system event kinds. `command.result`
// semantics (round 3): ok=true is an ACK even when `detail` carries a note
// like "smart rtl engaged (slot-layered)" — detail must NEVER render as an
// error; `error` appears only on refusals/transport failures.
function cmdLifecycle(m){
  const idOf = () => m.id || m.request ||
    `${m.vehicle || "?"}/${m.command || m.sensor || "?"}`;
  switch (m.kind){
    case "command.sent":
      cmdUpsert(idOf(), { vehicle:m.vehicle, command:m.command,
        state:"sent", t:m.t });
      break;
    case "command.result": {
      const c = cmdUpsert(idOf(), { vehicle:m.vehicle, command:m.command,
        state: m.ok ? "acked" : "refused", detail: m.detail || "", t:m.t });
      toast(`${c.vehicle} ${c.command} ${m.ok ? "acked" : "refused"}` +
        (c.detail ? ` — ${c.detail}` : ""), m.ok ? "ok" : "err");
      break; }
    case "command.timeout": {
      const c = cmdUpsert(idOf(), { vehicle:m.vehicle, command:m.command,
        state:"timeout", t:m.t });
      toast(`${c.vehicle} ${c.command} timed out`, "warn");
      break; }
    case "command.rejected":
      cmdUpsert(idOf(), { vehicle:m.vehicle, command:m.command,
        state:"refused", detail:m.reason || "", t:m.t });
      toast(`${m.vehicle} ${m.command} refused — ${m.reason || ""}`, "err");
      break;
    case "sensor.request":
      cmdUpsert(idOf(), { vehicle:m.vehicle,
        command:`sensor ${m.sensor || ""} ${m.mode || ""}`.trim(),
        state:"sent", t:m.t });
      break;
    case "sensor.result": {
      const st = m.status === "captured" ? "done"
        : m.status === "accepted" ? "acked"
        : m.status === "rejected" ? "refused" : (m.status || "done");
      const fields = { vehicle:m.vehicle, state:st,
        detail: m.message || "", t:m.t };
      const existing = CMDS.byId[idOf()];
      if (!existing || !existing.command)
        fields.command = `sensor ${m.sensor || ""}`.trim();
      const c = cmdUpsert(idOf(), fields);
      toast(`${c.vehicle} ${c.command} ${st}` +
        (c.detail ? ` — ${c.detail}` : ""),
        st === "refused" ? "err" : "ok");
      break; }
    case "sensor.timeout":
      cmdUpsert(idOf(), { vehicle:m.vehicle, state:"timeout", t:m.t });
      toast(`${m.vehicle} sensor request timed out`, "warn");
      break;
    case "sensor.failed":
    case "sensor.rejected":
      cmdUpsert(idOf(), { vehicle:m.vehicle, state:"failed",
        detail: m.error || m.reason || "", t:m.t });
      toast(`${m.vehicle} sensor request failed — ${m.error || m.reason || ""}`, "err");
      break;
    case "system.shutdown_sent":
      cmdUpsert(`sys/${m.vehicle}`, { vehicle:m.vehicle, command:"shutdown",
        state:"sent", t:m.t });
      break;
    case "system.shutdown_result": {
      const ok = m.status === "accepted";
      cmdUpsert(`sys/${m.vehicle}`, { vehicle:m.vehicle, command:"shutdown",
        state: ok ? "acked" : "refused", detail: m.message || "", t:m.t });
      toast(`${m.vehicle} shutdown ${m.status}` +
        (m.message ? ` — ${m.message}` : ""), ok ? "ok" : "err");
      break; }
    case "system.shutdown_timeout":
    case "system.shutdown_failed":
    case "system.rejected":
      cmdUpsert(`sys/${m.vehicle}`, { vehicle:m.vehicle, command:"shutdown",
        state: m.kind.endsWith("timeout") ? "timeout" : "failed",
        detail: m.error || m.reason || "", t:m.t });
      toast(`${m.vehicle} shutdown ${m.kind.split(".")[1]}`, "err");
      break;
  }
}

// ---------- events / mission state ----------
const STATE_TAG = { idle:"cds-tag--gray", searching:"cds-tag--blue",
  investigating:"cds-tag--yellow",
  done:"cds-tag--green", aborted:"cds-tag--red" };
function setState(state){
  mstate.textContent = state;
  mstate.className = "cds-tag " + (STATE_TAG[state] ?? "cds-tag--gray");
}
// ---------- targets panel ----------
const TGT_TAG = { queued:"cds-tag--yellow", investigating:"cds-tag--blue",
                  done:"cds-tag--green", failed:"cds-tag--red",
                  cancelled:"cds-tag--gray" };
// Job ✕ in the detection panel: a QUEUED job is removed purely in the
// mission machine (job_cancel → target.job_cancelled); an ACTIVE job is
// aborted at its assigned vehicle (task_abort investigate) and completes
// through the vehicle's busy→idle transition.
function cancelJob(index, sensor){
  const t = targets.find(x => x.index === index);
  const j = t && (t.jobs || []).find(x => x.sensor === sensor);
  if (!j) return;
  if (j.status === "queued")
    send({cmd:"job_cancel", index, sensor});
  else if (j.status === "investigating" && j.vehicle)
    send({cmd:"task_abort", vehicle:j.vehicle, label:"investigate"});
}
function renderTargets(){
  mtargets.textContent = targets.length;
  if (!targets.length){
    detCard.textContent = mstate.textContent === "searching"
      ? "searching…" : "none yet";
    thumb.style.display = "none";
    return;
  }
  detCard.innerHTML = targets.map(t => `
    <div style="display:flex;justify-content:space-between;align-items:center;
                margin-bottom:8px">
      <span><b>#${t.index} ${t.object_id}</b> · ${(t.confidence*100).toFixed(1)}%
        <div class="mono">${t.lat.toFixed(6)}, ${t.lon.toFixed(6)}</div>
        <div>${(t.jobs || []).map(j => `
          <span class="cds-tag ${TGT_TAG[j.status]||'cds-tag--gray'}"
                title="${j.vehicle || 'not assigned yet'}">${j.sensor} ${j.status}</span>
          ${j.status === "queued" || j.status === "investigating"
            ? `<button class="xabort" onclick="cancelJob(${t.index},'${j.sensor}')"
                 title="${j.status === "queued"
                   ? `remove this queued ${j.sensor} job (never dispatches)`
                   : `abort ${j.vehicle}'s investigation (scoped — no RTL)`}">✕</button>`
            : ""}
          ${(j.artifacts || []).map(a => `<a target="_blank"
            href="/artifact?name=${encodeURIComponent(a)}">${j.sensor === "audio"
              ? "audio" : "capture"} ↗</a>`).join(" ")}`).join(" ")}
        </div>
      </span>
      <span class="cds-tag ${TGT_TAG[t.status]||'cds-tag--gray'}">${t.status}</span>
    </div>`).join("");
  const latest = targets[targets.length-1];
  if (latest && latest.frame){
    thumb.src = `/artifact?name=${encodeURIComponent(latest.frame)}`;
    thumb.style.display = "block";
  }
}

function onEvent(m){
  const line = document.createElement("div");
  line.className = "n";
  const t = new Date(m.t*1000).toLocaleTimeString();
  const isDetect = m.kind.startsWith("detect.") && m.seq != null;
  const skip = ["type","kind","t"].concat(isDetect ? ["frame","seq"] : []);
  const extra = Object.entries(m).filter(([k]) =>
    !skip.includes(k)).map(([k,v]) =>
    `${k}=${typeof v==="number" ? +v.toFixed(5) : JSON.stringify(v)}`).join(" ");
  const tag = isDetect ? `<b>frame #${m.seq}</b> ` : "";
  line.innerHTML = `<span class="t">${t}</span>${m.kind} ${tag}${extra}`;
  if (m.kind.includes("hit") || m.kind.includes("target_found") ||
      m.kind.includes("completed")) line.classList.add("hit");
  // ok=true NEVER renders as an error — an accepted ack's `detail` note
  // (e.g. "smart rtl engaged (slot-layered)") shows neutrally; error
  // styling is reserved for refusals, failures, and timeouts.
  if (m.ok === true) line.classList.remove("err");
  else if (m.kind.includes("fail") || m.kind.includes("timeout") ||
           m.kind.includes("rejected") || m.ok === false)
    line.classList.add("err");
  cmdLifecycle(m);
  // detect responses complete out of capture order (each frame's round
  // trip varies); slot each detect line above the first detect line with
  // a LOWER frame number so the log reads in frame order
  let anchor = null;
  if (isDetect){
    line.dataset.seq = m.seq;
    for (const child of log.children){
      const s = child.dataset.seq;
      if (s !== undefined && Number(s) < m.seq){ anchor = child; break; }
    }
  }
  if (anchor) log.insertBefore(line, anchor); else log.prepend(line);
  while (log.children.length > 250) log.lastChild.remove();

  // pin georeferenced events to the map, and let the log line locate
  // them: click pans the view to where (and shows when) it happened
  pushMapEvent(m);
  if (typeof m.lat === "number" && typeof m.lon === "number"){
    line.style.cursor = "pointer";
    line.title = "click to locate on map";
    line.onclick = () => gotoLL(m.lat, m.lon);  // pauses follow, pill resumes
  }

  const byIndex = i => targets.find(x => x.index === i);
  const jobOf = (tg, sensor) =>
    (tg.jobs || []).find(j => j.sensor === sensor);
  switch (m.kind){
    case "mission.started":
      setState("searching"); targets = []; mapEvents = []; hoverEvt = null;
      covTrack = [];             // live coverage shading restarts per mission
      renderTargets(); break;
    case "record.started":
      setRecUI(true);
      toast(`recording ${m.name || "session"} started`, "ok"); break;
    case "record.stopped":
      setRecUI(false);
      toast(`recording ${m.name || "session"} saved`, "ok"); break;
    case "mission.target_found":
      targets.push({ index:m.index, object_id:m.object_id,
        confidence:m.confidence, lat:m.lat, lon:m.lon, frame:m.frame,
        status:"queued", artifacts:[],
        jobs:(m.sensors || ["camera"]).map(s =>
          ({sensor:s, vehicle:"", status:"queued", artifacts:[]})) });
      renderTargets(); break;
    case "target.updated": {
      const tg = byIndex(m.index);
      if (tg){ tg.confidence = m.confidence; tg.lat = m.lat; tg.lon = m.lon;
               tg.frame = m.frame; renderTargets(); }
      break; }
    case "target.dispatch": {
      const tg = byIndex(m.index);
      if (tg){ tg.status = "investigating";
               const j = jobOf(tg, m.sensor);
               if (j){ j.status = "investigating"; j.vehicle = m.vehicle; }
               renderTargets(); }
      break; }
    case "target.job_cancelled": {
      const tg = byIndex(m.index);
      if (tg){
        const j = jobOf(tg, m.sensor);
        if (j) j.status = "cancelled";
        const done = s => ["done","failed","cancelled"].includes(s);
        if ((tg.jobs || []).every(x => done(x.status)))
          tg.status = tg.jobs.some(x => x.status === "failed") ? "failed"
            : tg.jobs.some(x => x.status === "done") ? "done" : "cancelled";
        renderTargets();
      }
      toast(`target #${m.index} ${m.sensor} job cancelled`, "ok");
      break; }
    case "target.job_completed":
    case "target.job_failed": {
      const tg = byIndex(m.index);
      if (tg){ const j = jobOf(tg, m.sensor);
               if (j){ j.status = m.kind === "target.job_completed"
                         ? "done" : "failed";
                       j.artifacts = m.artifacts || []; }
               renderTargets(); }
      break; }
    case "target.completed":
    case "target.failed": {
      const tg = byIndex(m.index);
      if (tg){ tg.status = m.kind === "target.completed" ? "done" : "failed";
               tg.artifacts = m.artifacts || []; renderTargets(); }
      break; }
    case "mission.completed":
      setState("done"); renderTargets(); break;
    case "mission.search_finished":
      // raster done; if targets remain, the IUAS queue is still draining
      if (targets.some(t => t.status === "queued" || t.status === "investigating"))
        setState("investigating");
      break;
    case "mission.search_failed":
    case "mission.search_timeout":
      // backend still drains/completes the queue; tag reflects the phase
      if (!targets.length) setState("done");
      break;
    case "command.sent":
      // operator stop of the searcher: reflect the abort immediately
      if (m.vehicle === VEHICLES[0] && mstate.textContent === "searching")
        setState("aborted");
      break;
    case "vehicle.enabled":
      setEnabledUI(m.vehicle, true); break;
    case "vehicle.disabled":
      setEnabledUI(m.vehicle, false); break;
  }
}

// ---------- Display panel: per-layer opacity, veil, icon/line scaling ----------
(function buildDispPanel(){
  const rows = [
    ["Background dim", 0, 0.85, 0.05, () => DISP.veil, v => DISP.veil = v],
    ["Icon size ×", 0.5, 2, 0.1, () => DISP.iconMul, v => DISP.iconMul = v],
    ["Line weight ×", 0.5, 2.5, 0.1, () => DISP.lineMul, v => DISP.lineMul = v],
    ["Sensors opacity", 0, 1, 0.05, () => DISP.op.sensors, v => DISP.op.sensors = v],
    ["Network opacity", 0, 1, 0.05, () => DISP.op.net, v => DISP.op.net = v],
    ["Events opacity", 0, 1, 0.05, () => DISP.op.events, v => DISP.op.events = v],
    ["Data opacity", 0, 1, 0.05, () => DISP.op.data, v => DISP.op.data = v],
    ["Trails opacity", 0, 1, 0.05, () => DISP.op.trails, v => DISP.op.trails = v],
    ["Plan opacity", 0, 1, 0.05, () => DISP.op.plan, v => DISP.op.plan = v],
    ["Coverage opacity", 0, 1, 0.05, () => DISP.op.coverage, v => DISP.op.coverage = v],
  ];
  const outs = [];
  for (const [label, lo, hi, step, get, set] of rows){
    const row = document.createElement("div");
    row.className = "row";
    const lab = document.createElement("label");
    lab.textContent = label;
    const inp = document.createElement("input");
    inp.type = "range"; inp.min = lo; inp.max = hi; inp.step = step;
    inp.value = get();
    const out = document.createElement("output");
    const show = () => { out.value = (+get()).toFixed(2).replace(/0$/, ""); };
    show(); outs.push([inp, get, show]);
    inp.oninput = () => { set(+inp.value); show(); saveDisp(); };
    row.append(lab, inp, out);
    dispPanel.appendChild(row);
  }
  const reset = document.createElement("button");
  reset.className = "cds-btn cds-btn--ghost";
  reset.style.cssText = "height:24px;padding:0 8px;font-size:12px";
  reset.textContent = "Reset defaults";
  reset.onclick = () => {
    Object.assign(DISP, { veil: 0.35, iconMul: 1, lineMul: 1 });
    Object.assign(DISP.op, { sensors: 1, net: 1, events: 0.9, data: 1,
      trails: 1, plan: 1, coverage: 0.4 });
    for (const [inp, get, show] of outs){ inp.value = get(); show(); }
    saveDisp();
  };
  dispPanel.appendChild(reset);
})();

// ---------- collapsible tool sections (state persists per header) ----------
function makeCollapsible(panel, panelKey){
  let body = null;
  for (const el of [...panel.children]){
    if (el.tagName === "H3"){
      body = document.createElement("div");
      body.className = "secbody";
      el.after(body);
      el.classList.add("sech");
      const chev = document.createElement("span");
      chev.className = "chev";
      el.prepend(chev);
      const key = `muas3.sec.${panelKey}.${el.textContent.trim()}`;
      const bodyEl = body;
      let open = true;
      try { open = localStorage.getItem(key) !== "0"; } catch (e) {}
      const apply = () => {
        bodyEl.style.display = open ? "" : "none";
        chev.textContent = open ? "▾ " : "▸ ";
      };
      apply();
      el.onclick = () => {
        open = !open; apply();
        try { localStorage.setItem(key, open ? "1" : "0"); } catch (e) {}
      };
    } else if (body) body.appendChild(el);
  }
}
makeCollapsible(sidebar, "side");
makeCollapsible(right, "right");

// ---------- resizable / collapsible side panels ------------------------------
const PANEL_KEY = "muas3.panels";
const PANELS = { side: { w: 336, open: true }, right: { w: 288, open: true } };
(function loadPanels(){
  try {
    const s = JSON.parse(localStorage.getItem(PANEL_KEY) || "{}");
    for (const k of ["side", "right"]){
      if (s[k]){
        if (typeof s[k].w === "number") PANELS[k].w = s[k].w;
        if (typeof s[k].open === "boolean") PANELS[k].open = s[k].open;
      }
    }
  } catch (e) {}
})();
function savePanels(){
  try { localStorage.setItem(PANEL_KEY, JSON.stringify(PANELS)); } catch (e) {}
}
const clampW = w => Math.max(220, Math.min(560, w));
function applyPanels(){
  const b = document.body.style;
  b.setProperty("--side-w", PANELS.side.open ? `${clampW(PANELS.side.w)}px` : "0px");
  b.setProperty("--right-w", PANELS.right.open ? `${clampW(PANELS.right.w)}px` : "0px");
  sidebar.style.display = PANELS.side.open ? "" : "none";
  right.style.display = PANELS.right.open ? "" : "none";
  sideGrip.style.display = PANELS.side.open ? "" : "none";
  rightGrip.style.display = PANELS.right.open ? "" : "none";
  sideTab.textContent = PANELS.side.open ? "◂" : "▸";
  rightTab.textContent = PANELS.right.open ? "▸" : "◂";
  resize();          // the map canvas absorbs the width change
}
sideTab.onclick = () => { PANELS.side.open = !PANELS.side.open;
  savePanels(); applyPanels(); };
rightTab.onclick = () => { PANELS.right.open = !PANELS.right.open;
  savePanels(); applyPanels(); };
function gripDrag(grip, which){
  grip.addEventListener("mousedown", e => {
    e.preventDefault();
    grip.classList.add("dragging");
    const move = ev => {
      PANELS[which].w = clampW(which === "side"
        ? ev.clientX : window.innerWidth - ev.clientX);
      applyPanels();
    };
    const up = () => {
      grip.classList.remove("dragging");
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      savePanels();
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });
}
gripDrag(sideGrip, "side");
gripDrag(rightGrip, "right");
applyPanels();

renderCmdLog();
renderLegend();
resize(); syncMapCtl(); connect(); draw();
setTimeout(preview, 800);
</script>
